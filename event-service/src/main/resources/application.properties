spring.application.name=event-service
server.port=8083

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/event_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=mysqlroot

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Kafka Consumer Config
spring.kafka.consumer.group-id=event-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Tell Flyway to only look in the 'event' sub-folder
spring.flyway.locations=classpath:db/migration/event

# Trusted packages for JSON deserialization
spring.kafka.consumer.properties.spring.json.trusted.packages=com.order_service.dto,com.event_service.dto