server:
  port: 8030

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Route for Order Service
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/orders/**

        # Route for Event Service
        - id: event-service
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/events/**

        # Route for Customer Service
        - id: customer-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/api/customers/**

        # Route for Venue Service
        - id: venue-service
          uri: lb://VENUE-SERVICE
          predicates:
            - Path=/api/venues/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/