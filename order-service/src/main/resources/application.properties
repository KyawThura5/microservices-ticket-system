spring.application.name=order-service
server.port=8084

# MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:order_db}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:mysqlroot}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Kafka Producer Config
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Consumer Config (To listen for confirmation/rejection)
spring.kafka.consumer.group-id=${KAFKA_ORDER_GROUP_ID:order-group}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Trusted packages (Crucial for receiving DTOs from event-service)
spring.kafka.consumer.properties.spring.json.trusted.packages=com.order_service.dto,com.event_service.dto
spring.kafka.producer.properties.spring.json.type.mapping=orderPlaced:com.order_service.dto.OrderPlacedEvent,orderConfirmed:com.order_service.dto.OrderConfirmedEvent,orderRejected:com.order_service.client.OrderRejectedEvent
spring.kafka.consumer.properties.spring.json.type.mapping=orderPlaced:com.order_service.dto.OrderPlacedEvent,orderConfirmed:com.order_service.dto.OrderConfirmedEvent,orderRejected:com.order_service.client.OrderRejectedEvent
# Change the value-deserializer to the ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
# Tell the wrapper to use JsonDeserializer internally
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Kafka topics (allow environment-specific prefix)
kafka.topic.prefix=${KAFKA_TOPIC_PREFIX:}
kafka.topic.order-placed=${kafka.topic.prefix}order-placed
kafka.topic.order-confirmed=${kafka.topic.prefix}order-confirmed
kafka.topic.order-rejected=${kafka.topic.prefix}order-rejected

# OpenFeign timeouts
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JPA / Management
spring.jpa.open-in-view=false
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.readinessState.enabled=true
management.health.livenessState.enabled=true
management.endpoint.health.show-details=never
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
